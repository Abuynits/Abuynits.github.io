{% extends "layout.html" %}
{% from "components/fieldset.html" import fieldset %}

{% block content %}
  {% call fieldset("~/random/favorite_mtb.html") %}
    <section
      class="outline outline-1 outline-black dark:outline-gray-300 shadow-[5px_5px_0px_1px_rgba(0,0,0,0.5)] dark:shadow-[5px_5px_0px_1px_rgba(255,255,255,0.25)] p-3"
      aria-label="Mountain biking highlights"
    >
      <div class="relative aspect-[4/3] w-full overflow-hidden outline outline-1 outline-black dark:outline-gray-300 bg-black/5 dark:bg-white/5">
        <img
          id="mtb-slide-image"
          src=""
          alt=""
          class="h-full w-full object-cover"
          loading="lazy"
        />
      </div>

      <div class="mt-3 flex flex-wrap items-center gap-2">
        <button id="mtb-prev" type="button" class="pub-btn">Previous</button>
        <button id="mtb-next" type="button" class="pub-btn">Next</button>
        <span id="mtb-index" class="text-sm"></span>
      </div>

      <article class="mt-3">
        <h3 id="mtb-title" class="m-0"></h3>
        <p id="mtb-location" class="mt-1 mb-1 italic"></p>
        <p id="mtb-description" class="mt-1 mb-0"></p>
      </article>
    </section>

    <script>
      (function () {
        // Customize this array to add/remove rides, images, or descriptions.
        const slides = [
          {
            title: "Whistler",
            location: "Whistler, B.C.",
            description: "",
            image: "/assets/mtb/bc_whistler.png"
          },
          {
            title: "Mammoth Mountain",
            location: "Mammoth Lakes, CA",
            description: "",
            image: "/assets/mtb/ca_mammoth.png"
          },
          {
            title: "Freel Peak / Tahoe Rim Trail",
            location: "Tahoe Basin, CA",
            description: "",
            image: "/assets/mtb/ca_freel_peak.png"
          },
          {
            title: "Heavenly 'Ski' Resort",
            location: "South Lake Tahoe, CA",
            description: "",
            image: "/assets/mtb/ca_heavenly.png"
          },
          {
            title: "Tahoe Rim Trail",
            location: "Tahoe Basin, CA/NV",
            description: "",
            image: "/assets/mtb/ca_tahoe_rim.png"
          },
          {
            title: "Tiger Mountain",
            location: "Issaquah, WA",
            description: "",
            image: "/assets/mtb/wa_tiger_mountain.png"
          }
        ];

        const imageEl = document.getElementById("mtb-slide-image");
        const titleEl = document.getElementById("mtb-title");
        const locationEl = document.getElementById("mtb-location");
        const descriptionEl = document.getElementById("mtb-description");
        const indexEl = document.getElementById("mtb-index");
        const prevBtn = document.getElementById("mtb-prev");
        const nextBtn = document.getElementById("mtb-next");

        if (!imageEl || !titleEl || !locationEl || !descriptionEl || !indexEl || !prevBtn || !nextBtn) {
          return;
        }

        if (slides.length === 0) {
          titleEl.textContent = "No mountain biking slides configured yet.";
          return;
        }

        let activeIndex = 0;

        const render = function () {
          const slide = slides[activeIndex];
          imageEl.src = slide.image;
          titleEl.textContent = slide.title;
          locationEl.textContent = slide.location;
          descriptionEl.textContent = slide.description;
          indexEl.textContent = (activeIndex + 1) + " / " + slides.length;
        };

        prevBtn.addEventListener("click", function () {
          activeIndex = (activeIndex - 1 + slides.length) % slides.length;
          render();
        });

        nextBtn.addEventListener("click", function () {
          activeIndex = (activeIndex + 1) % slides.length;
          render();
        });

        render();
      })();
    </script>
  {% endcall %}
{% endblock %}
